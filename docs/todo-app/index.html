<!doctype html>
<html lang="zh-Hant">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Task Space | 質感待辦事項</title>

    <!-- Google Fonts: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg-color: #0b0f17;
            --panel-bg: rgba(17, 24, 39, 0.7);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;

            --accent-primary: #7c3aed;
            /* Violet */
            --accent-glow: rgba(124, 58, 237, 0.3);

            --category-work: #3b82f6;
            /* Blue */
            --category-personal: #10b981;
            /* Emerald */
            --category-shopping: #f59e0b;
            /* Amber */
            --category-other: #ec4899;
            /* Pink */

            --font-display: 'Outfit', 'Inter', system-ui, -apple-system, sans-serif;
            --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Ambient glowing lights */
        body::before {
            content: '';
            position: absolute;
            top: -10%;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 400px;
            background: radial-gradient(circle, rgba(124, 58, 237, 0.12) 0%, rgba(0, 0, 0, 0) 70%);
            z-index: -1;
            pointer-events: none;
            filter: blur(40px);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 30px;
            align-self: flex-start;
            max-width: 600px;
            width: 100%;
            margin-left: auto;
            margin-right: auto;
            transition: color 0.3s ease, transform 0.3s ease;
        }

        .back-link:hover {
            color: #fff;
            transform: translateX(-4px);
        }

        .back-link svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        /* Todo Container */
        .todo-container {
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            width: 100%;
            max-width: 600px;
            padding: 36px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: scaleUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        header {
            margin-bottom: 28px;
        }

        h1 {
            font-family: var(--font-display);
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }

        .tagline {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 300;
        }

        /* Progress Bar Section */
        .progress-section {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 24px;
        }

        .progress-text {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .progress-bar-bg {
            height: 8px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 999px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #7c3aed, #a78bfa);
            border-radius: 999px;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 10px rgba(124, 58, 237, 0.5);
        }

        /* Input Controls */
        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .input-wrapper {
            flex-grow: 1;
            position: relative;
        }

        input[type="text"] {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 14px 18px;
            color: #fff;
            font-family: var(--font-sans);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 15px var(--accent-glow);
            background: rgba(0, 0, 0, 0.5);
        }

        select {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 0 14px;
            color: #fff;
            font-family: var(--font-sans);
            font-size: 0.9rem;
            outline: none;
            cursor: pointer;
            transition: border-color 0.3s ease;
        }

        select:focus {
            border-color: var(--accent-primary);
        }

        .add-btn {
            background: var(--accent-primary);
            color: #fff;
            border: none;
            border-radius: 14px;
            width: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
        }

        .add-btn:hover {
            background: #6d28d9;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(124, 58, 237, 0.5);
        }

        .add-btn:active {
            transform: translateY(0);
        }

        .add-btn svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.5;
        }

        /* Filter Tabs */
        .filters {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding-bottom: 14px;
            margin-bottom: 16px;
        }

        .tabs {
            display: flex;
            gap: 6px;
        }

        .tab {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 6px 12px;
            font-size: 0.85rem;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.04);
        }

        .tab.active {
            color: #fff;
            background: rgba(124, 58, 237, 0.15);
            border: 1px solid rgba(124, 58, 237, 0.2);
        }

        .clear-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 0.85rem;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .clear-btn:hover {
            color: #ef4444;
        }

        /* Task List */
        .task-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 380px;
            overflow-y: auto;
            padding-right: 4px;
        }

        /* Custom Scrollbar for list */
        .task-list::-webkit-scrollbar {
            width: 6px;
        }

        .task-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .task-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 99px;
        }

        .task-list::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .task-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 14px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
            transition: all 0.3s ease;
        }

        .task-item:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.08);
            transform: scale(1.01);
        }

        .task-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-grow: 1;
            cursor: pointer;
        }

        /* Checkbox Styling */
        .checkbox {
            width: 20px;
            height: 20px;
            border-radius: 6px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .task-item.completed .checkbox {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
            box-shadow: 0 0 8px rgba(124, 58, 237, 0.4);
        }

        .checkbox svg {
            width: 12px;
            height: 12px;
            stroke: #fff;
            stroke-width: 3;
            fill: none;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .task-item.completed .checkbox svg {
            opacity: 1;
        }

        .task-text {
            font-size: 0.95rem;
            word-break: break-all;
            transition: all 0.3s ease;
        }

        .task-item.completed .task-text {
            color: var(--text-muted);
            text-decoration: line-through;
        }

        /* Category Badges */
        .cat-badge {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 99px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            flex-shrink: 0;
        }

        .cat-work {
            background: rgba(59, 130, 246, 0.12);
            color: var(--category-work);
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .cat-personal {
            background: rgba(16, 185, 129, 0.12);
            color: var(--category-personal);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .cat-shopping {
            background: rgba(245, 158, 11, 0.12);
            color: var(--category-shopping);
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .cat-other {
            background: rgba(236, 72, 153, 0.12);
            color: var(--category-other);
            border: 1px solid rgba(236, 72, 153, 0.2);
        }

        /* Delete Button */
        .delete-btn {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.15);
            cursor: pointer;
            padding: 6px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .task-item:hover .delete-btn {
            color: var(--text-muted);
        }

        .delete-btn:hover {
            color: #ef4444 !important;
            background: rgba(239, 68, 68, 0.08);
        }

        .delete-btn svg {
            width: 16px;
            height: 16px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            animation: fadeIn 0.4s ease;
        }

        .empty-state svg {
            width: 48px;
            height: 48px;
            color: rgba(255, 255, 255, 0.05);
            animation: float 3s ease-in-out infinite;
        }

        .empty-state p {
            font-size: 0.9rem;
            font-weight: 300;
        }

        /* Keyframes Animations */
        @keyframes scaleUp {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: translateY(-12px);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        /* Responsive Layouts */
        @media (max-width: 640px) {
            .todo-container {
                padding: 24px;
            }

            .input-group {
                flex-direction: column;
                gap: 10px;
            }

            .input-group select,
            .input-group .add-btn {
                width: 100%;
                padding: 12px;
            }

            .input-group .add-btn {
                height: 44px;
            }
        }
    </style>
</head>

<body>
    <!-- Back to Hub Link -->
    <a href="../index.html" class="back-link">
        <svg viewBox="0 0 24 24">
            <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" />
        </svg>
        返回網頁導覽大廳 (Web Hub)
    </a>

    <div class="todo-container">
        <header>
            <h1 id="todo-title">Task Space</h1>
            <p class="tagline">管理您的日常任務，保持工作與生活的平衡。</p>
        </header>

        <!-- Progress Indicator -->
        <div class="progress-section">
            <div class="progress-text">
                <span>任務進度追蹤</span>
                <span id="progress-percent">0%</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progress-fill"></div>
            </div>
        </div>

        <!-- Task Input -->
        <div class="input-group">
            <div class="input-wrapper">
                <input type="text" id="task-input" placeholder="新增待辦事項..." autocomplete="off">
            </div>
            <select id="category-select">
                <option value="work">工作 (Work)</option>
                <option value="personal" selected>個人 (Personal)</option>
                <option value="shopping">購物 (Shopping)</option>
                <option value="other">其他 (Other)</option>
            </select>
            <button class="add-btn" id="add-btn" title="新增事項">
                <svg viewBox="0 0 24 24">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </button>
        </div>

        <!-- Filter Bar -->
        <div class="filters">
            <div class="tabs">
                <button class="tab active" data-filter="all">全部</button>
                <button class="tab" data-filter="active">未完成</button>
                <button class="tab" data-filter="completed">已完成</button>
            </div>
            <button class="clear-btn" id="clear-completed-btn">清除已完成</button>
        </div>

        <!-- Task List Container -->
        <ul class="task-list" id="task-list">
            <!-- Dynamically populated -->
        </ul>
    </div>

    <script>
        // DOM Elements
        const taskInput = document.getElementById('task-input');
        const categorySelect = document.getElementById('category-select');
        const addBtn = document.getElementById('add-btn');
        const taskList = document.getElementById('task-list');
        const tabs = document.querySelectorAll('.tab');
        const clearCompletedBtn = document.getElementById('clear-completed-btn');
        const progressFill = document.getElementById('progress-fill');
        const progressPercent = document.getElementById('progress-percent');

        // State Manager
        let todos = JSON.parse(localStorage.getItem('todos')) || [
            { id: 1, text: '探索 Web Hub 入口首頁', category: 'personal', completed: true },
            { id: 2, text: '查看台灣半導體整點五大新聞', category: 'work', completed: false },
            { id: 3, text: '嘗試新增一項你今天要做的事情吧！', category: 'other', completed: false }
        ];

        let currentFilter = 'all';

        // Initialize App
        function init() {
            render();
            setupEventListeners();
        }

        // Setup DOM Listeners
        function setupEventListeners() {
            addBtn.addEventListener('click', addTodo);
            taskInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addTodo();
            });

            tabs.forEach(tab => {
                tab.addEventListener('click', (e) => {
                    tabs.forEach(t => t.classList.remove('active'));
                    e.target.classList.add('active');
                    currentFilter = e.target.getAttribute('data-filter');
                    render();
                });
            });

            clearCompletedBtn.addEventListener('click', clearCompleted);
        }

        // Render Todo items based on filters and update progress
        function render() {
            taskList.innerHTML = '';

            const filteredTodos = todos.filter(todo => {
                if (currentFilter === 'active') return !todo.completed;
                if (currentFilter === 'completed') return todo.completed;
                return true;
            });

            if (filteredTodos.length === 0) {
                renderEmptyState();
            } else {
                filteredTodos.forEach(todo => {
                    const li = document.createElement('li');
                    li.className = `task-item ${todo.completed ? 'completed' : ''}`;
                    li.setAttribute('data-id', todo.id);

                    li.innerHTML = `
                        <div class="task-left">
                            <div class="checkbox">
                                <svg viewBox="0 0 24 24">
                                    <polyline points="20 6 9 17 4 12"></polyline>
                                </svg>
                            </div>
                            <span class="task-text">${escapeHtml(todo.text)}</span>
                            <span class="cat-badge cat-${todo.category}">${todo.category}</span>
                        </div>
                        <button class="delete-btn" title="刪除任務">
                            <svg viewBox="0 0 24 24">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                <line x1="10" y1="11" x2="10" y2="17"></line>
                                <line x1="14" y1="11" x2="14" y2="17"></line>
                            </svg>
                        </button>
                    `;

                    // Bind item specific actions
                    li.querySelector('.task-left').addEventListener('click', () => toggleTodo(todo.id));
                    li.querySelector('.delete-btn').addEventListener('click', (e) => {
                        e.stopPropagation();
                        deleteTodo(todo.id, li);
                    });

                    taskList.appendChild(li);
                });
            }

            updateProgress();
            saveToLocalStorage();
        }

        // Render Empty state visual template
        function renderEmptyState() {
            taskList.innerHTML = `
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                        <polyline points="22 4 12 14.01 9 11.01"></polyline>
                    </svg>
                    <p>目前沒有任何任務，放鬆一下，或新增待辦事項吧！</p>
                </div>
            `;
        }

        // Add a new todo item
        function addTodo() {
            const text = taskInput.value.trim();
            if (!text) return;

            const category = categorySelect.value;
            const newTodo = {
                id: Date.now(),
                text,
                category,
                completed: false
            };

            todos.push(newTodo);
            taskInput.value = '';
            render();
        }

        // Toggle todo completion state
        function toggleTodo(id) {
            todos = todos.map(todo => {
                if (todo.id === id) {
                    return { ...todo, completed: !todo.completed };
                }
                return todo;
            });
            render();
        }

        // Delete todo item with a smooth slide-out animation
        function deleteTodo(id, element) {
            element.style.animation = 'fadeOut 0.25s ease forwards';
            setTimeout(() => {
                todos = todos.filter(todo => todo.id !== id);
                render();
            }, 250);
        }

        // Clear all completed todos
        function clearCompleted() {
            const originalLength = todos.length;
            todos = todos.filter(todo => !todo.completed);
            if (todos.length !== originalLength) {
                render();
            }
        }

        // Update progress bar
        function updateProgress() {
            if (todos.length === 0) {
                progressFill.style.width = '0%';
                progressPercent.textContent = '0%';
                return;
            }

            const completedCount = todos.filter(todo => todo.completed).length;
            const percentage = Math.round((completedCount / todos.length) * 100);

            progressFill.style.width = `${percentage}%`;
            progressPercent.textContent = `${percentage}%`;
        }

        // LocalStorage Helpers
        function saveToLocalStorage() {
            localStorage.setItem('todos', JSON.stringify(todos));
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, function (m) { return map[m]; });
        }

        // Run application
        init();
    </script>
</body>

</html>
